# database init, supports oracle too
database=oracle
spring.datasource.url=${ORACLE_URL:jdbc:oracle:thin:@localhost:1521/FREEPDB1}
spring.datasource.username=${ORACLE_USER:petclinic}
spring.datasource.password=${ORACLE_PASS:petclinic}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
# SQL is written to be idempotent so this is safe
spring.sql.init.mode=always
spring.sql.init.separator=@@
